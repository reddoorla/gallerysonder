<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.ico" />
		<link rel="apple-touch-icon" sizes="180x180" href="%sveltekit.assets%/apple-touch-icon.png" />
		<link rel="icon" type="image/png" sizes="32x32" href="%sveltekit.assets%/favicon-32x32.png" />
		<link rel="icon" type="image/png" sizes="16x16" href="%sveltekit.assets%/favicon-16x16.png" />
		<link rel="manifest" href="%sveltekit.assets%/site.webmanifest" />
		<link rel="preconnect" href="https://use.typekit.net" crossorigin />
		<link rel="preload" as="style" href="https://use.typekit.net/noj4tji.css" />
		<link
			rel="stylesheet"
			href="https://use.typekit.net/noj4tji.css"

			<link rel="stylesheet" href="https://use.typekit.net/noj4tji.css" />
		</noscript>
		<script src="https://kit.fontawesome.com/78a9146bce.js" crossorigin="anonymous" defer></script>

		<script
			async
			defer
			src="https://static.cdn.prismic.io/prismic.js?new=true&repo=gallerysonder"
		></script>

		<!--
			Google Tag Manager is intentionally NOT loaded here. It is consent-gated
			and injected by CookieConsent.svelte only after the visitor accepts
			(load-after-accept model, matching the Facebook Pixel). See GTM-5FVCTMK7.
		-->

		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<style>
			body {
				overflow-x: hidden;
			}
		</style>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
