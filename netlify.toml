[build]
    command = "pnpm build"
    publish = "build/"
    functions = "functions/"

[build.environment]
    NODE_VERSION = "24"
    COREPACK_INTEGRITY_KEYS = "0"

# Baseline security headers for all responses.
#
# NOTE: No Content-Security-Policy is currently emitted. svelte.config.js does
# NOT pass a `csp` option to createSvelteConfig, so neither SvelteKit nor this
# file sets one. Adding a CSP needs a report-only-first rollout: this site loads
# Typekit via an inline onload handler, plus consent-gated GTM/Facebook Pixel
# (which need nonce propagation) and a Google Maps embed — a naive policy would
# silently break fonts/analytics. Tracked as a follow-up, not wired up here.
[[headers]]
    for = "/*"
    [headers.values]
        Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
        X-Content-Type-Options = "nosniff"
        X-Frame-Options = "SAMEORIGIN"
        Referrer-Policy = "strict-origin-when-cross-origin"
        Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
        Cross-Origin-Opener-Policy = "same-origin"

[[headers]]
    for = "/favicon.png"
    [headers.values]
        Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
    for = "/_app/immutable/*"
    [headers.values]
        Cache-Control = "public, max-age=31536000, immutable"
