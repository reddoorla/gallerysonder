<!DOCTYPE html>
<html>
<head>
    <title>Netlify Forms</title>
</head>
<body>
    <form name="contact" method="post" data-netlify="true" data-netlify-honeypot="bot-field" style="display: none;">
        <input type="hidden" name="form-name" value="contact" />
        <input type="date" name="appointment_date" />
        <input type="text" name="appointment_time" />
    </form>

    <form name="inquiry" method="post" data-netlify="true" data-netlify-honeypot="bot-field" style="display: none;">
        <input type="hidden" name="form-name" value="inquiry" />
    </form>

    <form name="news" method="POST" data-netlify="true" data-netlify-honeypot="bot-field" style="display: none;">
        <input type="hidden" name="form-name" value="news" />
        <input type="email" name="email" />
    </form>

    <form name="rsvp" method="POST" data-netlify="true" data-netlify-honeypot="bot-field" style="display: none;">
        <input type="hidden" name="form-name" value="rsvp" />
    </form>
</body>
</html>
